# Shared env fragments (YAML anchors). Only one merge key (<<) per mapping — Compose rejects duplicate "<<".
x-aws-minio-env: &aws_minio_env
  AWS_ENDPOINT_URL: http://minio:9000
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-crypto-belief-lake}

x-user-code-env: &user_code_env
  DAGSTER_HOME: /opt/dagster/dagster_home
  <<: *aws_minio_env

x-webserver-env: &webserver_env
  DAGSTER_HOME: /opt/dagster/dagster_home
  PIPELINE_IMAGE: ${PIPELINE_IMAGE:-crypto-belief-pipeline}
  PIPELINE_TAG: ${PIPELINE_TAG:-local}

# Daemon = user-code AWS block + pipeline ref (same as webserver pipeline vars)
x-daemon-env: &daemon_env
  <<: *user_code_env
  PIPELINE_IMAGE: ${PIPELINE_IMAGE:-crypto-belief-pipeline}
  PIPELINE_TAG: ${PIPELINE_TAG:-local}

services:
  minio:
    image: minio/minio:latest
    container_name: crypto-belief-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - dagster

  dagster-postgres:
    image: postgres:16
    container_name: crypto-belief-dagster-postgres
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    volumes:
      - dagster_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster -d dagster"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - dagster

  dagster-user-code-crypto-belief:
    build:
      context: .
    image: ${PIPELINE_IMAGE:-crypto-belief-pipeline}:${PIPELINE_TAG:-local}
    container_name: crypto-belief-dagster-user-code
    command:
      [
        "dagster",
        "api",
        "grpc",
        "-m",
        "crypto_belief_pipeline.orchestration.definitions",
        "-h",
        "0.0.0.0",
        "-p",
        "4000",
      ]
    environment:
      <<: *user_code_env
    networks:
      - dagster

  dagster-webserver:
    build:
      context: .
      dockerfile: ./Dockerfile_dagster
    image: ${CONTROL_PLANE_IMAGE:-crypto-belief-dagster-control-plane}:${CONTROL_PLANE_TAG:-local}
    container_name: crypto-belief-dagster-webserver
    command:
      [
        "dagster-control-plane-entrypoint",
        "dagster-webserver",
        "-h",
        "0.0.0.0",
        "-p",
        "3000",
        "-w",
        "/opt/dagster/app/dagster/workspace.yaml",
      ]
    ports:
      - "3000:3000"
    environment:
      <<: *webserver_env
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./dagster:/opt/dagster/app/dagster:ro
    depends_on:
      dagster-postgres:
        condition: service_healthy
      dagster-user-code-crypto-belief:
        condition: service_started
    networks:
      - dagster

  dagster-daemon:
    build:
      context: .
      dockerfile: ./Dockerfile_dagster
    image: ${CONTROL_PLANE_IMAGE:-crypto-belief-dagster-control-plane}:${CONTROL_PLANE_TAG:-local}
    container_name: crypto-belief-dagster-daemon
    command:
      [
        "dagster-control-plane-entrypoint",
        "dagster-daemon",
        "run",
        "-w",
        "/opt/dagster/app/dagster/workspace.yaml",
      ]
    environment:
      <<: *daemon_env
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./dagster:/opt/dagster/app/dagster:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      dagster-postgres:
        condition: service_healthy
      dagster-user-code-crypto-belief:
        condition: service_started
    networks:
      - dagster

volumes:
  minio_data:
  dagster_home:
  dagster_postgres_data:

networks:
  dagster:
    name: crypto-belief-dagster
