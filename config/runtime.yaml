mode: low_latency

cadence:
  binance_raw_seconds: 60
  polymarket_prices_seconds: 300
  polymarket_discovery_seconds: 21600
  gdelt_seconds: 3600
  silver_seconds: 300
  gold_live_seconds: 300
  gold_labels_seconds: 3600
  soda_seconds: 3600
  reports_seconds: 86400

lake:
  micro_batch: true
  partition_granularity: hour
  compact_hourly: true
  compact_daily: true

quality:
  fast_checks_enabled: true
  soda_enabled: true
  soda_on_every_run: false

sample:
  # Default to enabled so `make run-sample` works out of the box for reviewers.
  # Sample isolation uses a separate bucket (not a key prefix) so the on-bucket
  # key layout stays identical to live (`raw/...`, `silver/...`, `gold/...`).
  sample_enabled: true
  # Required when sample_enabled=true. The CLI ensures this bucket exists.
  sample_lake_bucket: "crypto-belief-lake-sample"

