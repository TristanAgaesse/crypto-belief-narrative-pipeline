name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned dependencies
        # Install the exact pinned environment from the canonical lockfile so CI
        # has byte-for-byte reproducibility (runtime + dev tooling). The project
        # itself is layered in editable mode with --no-deps so its open ranges
        # in pyproject.toml don't override the locked versions.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install --no-deps -e .

      - name: Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy
        run: mypy src/crypto_belief_pipeline

      - name: Pytest
        run: pytest --cov=crypto_belief_pipeline --cov-report=term-missing --cov-fail-under=70
